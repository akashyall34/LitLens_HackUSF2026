name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -r backend/requirements.txt
        working-directory: .

      - name: Ruff lint
        run: ruff check backend/
        working-directory: .

      - name: Pytest (smoke import test)
        run: pytest backend/ --ignore=backend/migrations -q --tb=short
        working-directory: .
        env:
          DATABASE_URL: postgresql+psycopg://dummy:dummy@localhost/dummy
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-not-real
          GEMINI_API_KEY: dummy
          AWS_REGION: us-east-1
          S3_BUCKET: dummy
          SES_FROM_EMAIL: dummy@dummy.com
          APP_BASE_URL: http://localhost:8000
          FRONTEND_ORIGIN: http://localhost:5173

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/litlens
            bash deploy.sh
